<!-- app/templates/person_data_tab.html -->
{% extends "base.html" %}

{% block content %}
<!-- Demand and Supply Summary Statistics -->
<div id="person-data-stats-container" 
     hx-get="/person-data/stats" 
     hx-trigger="load, refreshList from:body"
     hx-swap="innerHTML">
    <div style="padding: 20px; text-align: center; color: var(--text-muted); background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 24px;">
        <span class="spinner"></span> Loading demand and capacity statistics...
    </div>
</div>

<div class="grid-2" style="grid-template-columns: 55% 45%;">
    <!-- Left Column: Search & Lists -->
    <div class="card" style="margin-bottom: 0; min-height: calc(100vh - 200px); display: flex; flex-direction: column;">
        <div class="card-title">Manage Database Records</div>
        
        <!-- Toggle Pill Switcher -->
        <div style="display: flex; gap: 8px; margin-bottom: 16px; background-color: var(--bg-primary); padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border);">
            <button class="btn btn-primary btn-sm" id="sub-tab-students" onclick="switchSubTab('students')" style="flex: 1; border-radius: calc(var(--radius-sm) - 2px); transition: var(--transition);">
                Students
            </button>
            <button class="btn btn-secondary btn-sm" id="sub-tab-examiners" onclick="switchSubTab('examiners')" style="flex: 1; border-radius: calc(var(--radius-sm) - 2px); transition: var(--transition);">
                Examiners
            </button>
        </div>

        <input type="hidden" name="type" id="person-type" value="students">
        
        <!-- Search bar -->
        <div style="margin-bottom: 16px;">
            <input type="text" 
                   id="search-input" 
                   name="search" 
                   placeholder="Search students by name, project title..." 
                   hx-get="/person-data/list" 
                   hx-trigger="keyup changed delay:200ms, search, load" 
                   hx-target="#list-container" 
                   hx-include="#person-type"
                   style="width: 100%; padding: 10px 14px; background-color: var(--bg-primary); border: 1px solid var(--border);">
        </div>

        <!-- Quick Add Examiner Form (only visible when examiners tab is active) -->
        <div id="quick-add-examiner-container" style="display: none; margin-bottom: 16px; padding: 14px; background-color: rgba(255,255,255,0.015); border: 1px dashed var(--border); border-radius: var(--radius-md);">
            <div style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;">
                <span>⚡</span> Quick Add Examiner
            </div>
            <form hx-post="/person-data/quick-add-examiner" 
                  hx-target="#edit-panel" 
                  hx-on:htmx:after-request="if(event.detail.successful) this.reset()"
                  style="display: flex; gap: 8px; flex-wrap: wrap; width: 100%;">
                <div style="flex: 2; min-width: 180px;">
                    <input type="text" name="full_name" placeholder="Full Name" required 
                           style="width: 100%; padding: 8px 12px; background-color: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.85rem;">
                </div>
                <div style="flex: 1; min-width: 110px;">
                    <select name="examiner_type" required 
                            style="width: 100%; padding: 8px 12px; background-color: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.85rem; height: 38px; cursor: pointer;">
                        <option value="external" selected>External</option>
                        <option value="internal">Internal</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem; height: 38px; border-radius: var(--radius-sm); font-weight: 500;">
                    Add Examiner
                </button>
            </form>
        </div>

        <!-- Table Container -->
        <div id="list-container" style="flex: 1; overflow-y: auto; max-height: calc(100vh - 350px);">
            <!-- HTMX swaps list fragment here -->
            <div style="padding: 40px; text-align: center;">
                <span class="spinner"></span> Loading list...
            </div>
        </div>
    </div>

    <!-- Right Column: Detail & Edit Form -->
    <div id="edit-panel" style="position: sticky; top: 24px;">
        <div class="card" style="margin-bottom: 0;">
            <div style="padding: 40px 20px; text-align: center; color: var(--text-muted); border: 1px dashed var(--border); border-radius: var(--radius-md); background-color: rgba(255,255,255,0.01);">
                <div style="font-size: 2rem; margin-bottom: 12px;">👤</div>
                <div style="font-weight: 500; color: var(--text-secondary);">No Person Selected</div>
                <p style="font-size: 0.85rem; margin-top: 4px;">Click any row on the left to view and edit details.</p>
            </div>
        </div>
    </div>
</div>

<script>
    function switchSubTab(type) {
        document.getElementById('person-type').value = type;
        const btnStudents = document.getElementById('sub-tab-students');
        const btnExaminers = document.getElementById('sub-tab-examiners');
        const searchInput = document.getElementById('search-input');
        const quickAddContainer = document.getElementById('quick-add-examiner-container');
        
        if (type === 'students') {
            btnStudents.className = "btn btn-primary btn-sm";
            btnExaminers.className = "btn btn-secondary btn-sm";
            searchInput.placeholder = "Search students by name, project title...";
            if (quickAddContainer) quickAddContainer.style.display = "none";
        } else {
            btnStudents.className = "btn btn-secondary btn-sm";
            btnExaminers.className = "btn btn-primary btn-sm";
            searchInput.placeholder = "Search examiners by name...";
            if (quickAddContainer) quickAddContainer.style.display = "block";
        }
        
        searchInput.value = "";
        // Trigger HTMX reload
        htmx.trigger('#search-input', 'search');
        
        // Reset details panel to default message
        document.getElementById('edit-panel').innerHTML = `
            <div class="card" style="margin-bottom: 0;">
                <div style="padding: 40px 20px; text-align: center; color: var(--text-muted); border: 1px dashed var(--border); border-radius: var(--radius-md); background-color: rgba(255,255,255,0.01);">
                    <div style="font-size: 2rem; margin-bottom: 12px;">👤</div>
                    <div style="font-weight: 500; color: var(--text-secondary);">No Person Selected</div>
                    <p style="font-size: 0.85rem; margin-top: 4px;">Click any row on the left to view and edit details.</p>
                </div>
            </div>
        `;
    }

    // Event listener for post-request refresh handling if list updates are triggered
    document.body.addEventListener('refreshList', function() {
        htmx.trigger('#search-input', 'search');
    });
</script>
{% endblock %}
