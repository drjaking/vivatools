<!-- app/templates/person_data_examiners_list.html -->
{% if examiners %}
<table id="examiners-data-table">
    <thead>
        <tr>
            <th class="sortable" onclick="sortExaminersTable(0)" style="width: 40%;">Name</th>
            <th class="sortable" onclick="sortExaminersTable(1)" style="width: 20%;">Type</th>
            <th class="sortable" onclick="sortExaminersTable(2)" style="width: 20%;">Workload</th>
            <th class="sortable" onclick="sortExaminersTable(3)" style="width: 20%;">Capacity</th>
        </tr>
    </thead>
    <tbody>
        {% for ex in examiners %}
            {% include "person_data_examiner_row.html" %}
        {% endfor %}
    </tbody>
</table>

<script>
(function() {
    var sortCol = null;
    var sortAsc = true;
    window.sortExaminersTable = function(colIndex) {
        var table = document.getElementById('examiners-data-table');
        if (!table) return;
        var tbody = table.querySelector('tbody');
        if (!tbody) return;
        var rows = Array.from(tbody.querySelectorAll('tr'));
        var header = table.querySelectorAll('th')[colIndex];
        
        if (sortCol === colIndex) {
            sortAsc = !sortAsc;
        } else {
            sortCol = colIndex;
            sortAsc = true;
        }
        
        table.querySelectorAll('th').forEach(function(th) {
            th.classList.remove('sort-asc', 'sort-desc');
        });
        header.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
        
        rows.sort(function(a, b) {
            var valA = a.cells[colIndex].innerText.trim().toLowerCase();
            var valB = b.cells[colIndex].innerText.trim().toLowerCase();
            if (valA < valB) return sortAsc ? -1 : 1;
            if (valA > valB) return sortAsc ? 1 : -1;
            return 0;
        });
        
        rows.forEach(function(row) { tbody.appendChild(row); });
    };
})();
</script>
{% else %}
<div style="padding: 40px; text-align: center; color: var(--text-muted);">
    No examiners found matching search criteria.
</div>
{% endif %}
